#########################################################################################################################################################################################################
### Conditional Z-tilt and homing
#########################################################################################################################################################################################################
[gcode_macro _CZTILT]
gcode:
    {% if printer.z_tilt.applied == False %}
        RESPOND MSG="Commencing Z-Tilt"
        _CHOME
        Z_TILT_ADJUST
        G28 Z
    {% endif %}
    Respond MSG="Z-Tilt Complete"
[gcode_macro TEST_BELTS]
gcode:
  {% if 'x' not in printer.toolhead.homed_axes %}
  {% if 'y' not in printer.toolhead.homed_axes %}
  G28 X Y 
  {% endif %}
  {% endif %}
 
  {% set circles = params.S|default(1)|int %}
  {% set rate = params.F|default(18000)|int %}
  {% for i in range(circles) %}
      G1 X{printer.toolhead.axis_minimum.x + 15} Y{printer.toolhead.axis_minimum.y + 15}  F{rate}
      G1 X{printer.toolhead.axis_maximum.x - 15} Y{printer.toolhead.axis_minimum.y + 15}  F{rate}
      G1 X{printer.toolhead.axis_maximum.x - 15} Y{printer.toolhead.axis_maximum.y - 15} F{rate}
      G1 X{printer.toolhead.axis_minimum.x + 15} Y{printer.toolhead.axis_maximum.y - 15}  F{rate}
      G1 X{printer.toolhead.axis_minimum.x + 15} Y{printer.toolhead.axis_minimum.y + 15}  F{rate}
    {% endfor %}
    G1 X{ printer.toolhead.axis_maximum.x / 2  } Y{printer.toolhead.axis_maximum.y  /2}  F{rate}
    
[gcode_macro _CHOME]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    
[gcode_macro M600]
gcode:
    {% set X = params.X|default(50)|float %}
    {% set Y = params.Y|default(0)|float %}
    {% set Z = params.Z|default(10)|float %}
    SAVE_GCODE_STATE NAME=M600_state
    PAUSE
    G91
    G1 E-.8 F2700
    G1 Z{Z}
    G90
    G1 X{X} Y{Y} F3000
    G91
    G1 E-50 F1000
    RESTORE_GCODE_STATE NAME=M600_state
    
[gcode_macro _RESET_SPEED]
description: Used to reset speeds after canceling/ending a print
gcode:
    {% set speed  = params.SPEED|default(printer.configfile.settings.printer.max_velocity)|int %}
    {% set accel  = params.ACCEL|default(printer.configfile.settings.printer.max_accel)|int %}
    {% set mcr  = params.MCR|default(printer.configfile.settings.printer.minimum_cruise_ratio)|float %}
    {% set scv  = params.SCV|default(printer.configfile.settings.printer.square_corner_velocity)|float %}
    
  M220 S100 ; Reset Speed factor override percentage to default (100%)
  M221 S100 ; Reset Extrude factor override percentage to default (100%)
  
  SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} MINIMUM_CRUISE_RATIO={mcr} SQUARE_CORNER_VELOCITY={scv}


#########################################################################################################################################################################################################
### Github Backup
#########################################################################################################################################################################################################
[gcode_macro update_git]
gcode:
    {% set message = params.MESSAGE|default() %}
    {% if message %}
        RUN_SHELL_COMMAND CMD=update_git_script_message PARAMS="'{params.MESSAGE}'"
    {% else %}
        RUN_SHELL_COMMAND CMD=update_git_script
    {% endif %}

[gcode_shell_command update_git_script]
command: bash -c "bash $HOME/klipper-backup/script.sh"
timeout: 90.0
verbose: True

[gcode_shell_command update_git_script_message]
command: bash -c "bash $HOME/klipper-backup/script.sh -c \"$0\""
timeout: 90.0
verbose: True
#########################################################################################################################################################################################################
### Color Change
########################################################################################################################################################################################################
[gcode_macro M600]
gcode:
    SAVE_GCODE_STATE NAME=M600_state
    PAUSE X=240 Y=10 
    G91
    G1 E-.8 F2700
    G1 Z{Z}
    G90
    G1 X{X} Y{Y} F3000
    G91
    G1 E-50 F1000
    RESTORE_GCODE_STATE NAME=M600_state

#########################################################################################################################################################################################################
### Misc.
#########################################################################################################################################################################################################
[gcode_macro Heatsoak]
gcode:
  _CHOME
  G1 X126.5 Y125 Z25
  M106 S255 ;PCF Fans to 100%
[gcode_macro Reload_Macros]
gcode:
  RELOAD_GCODE_MACROS
  
[gcode_macro Beacon_Auto_Offset]
gcode:
  G28 XY
  G28 Z METHOD=CONTACT CALIBRATE=1
[gcode_macro log]
description: Displays user-defined text. Used for status updates and debugging.
gcode:
  {% set msg = params.MSG|default() %}
  SET_DISPLAY_TEXT MSG="{msg}"
  RESPOND MSG="{msg}"
  
[gcode_macro M141]
description: Set bed_fans temperature
gcode:
  {% if 'S' in params %}
    SET_HEATER_TEMPERATURE HEATER=chamber TARGET={params.S|float}
  {% else %}
    RESPOND PREFIX="M141" MSG="Missing S parameter"
  {% endif %}
 
[gcode_macro M191]
description: Set bed_fans temperature and wait
gcode:
  {% if 'S' in params %}
    SET_HEATER_TEMPERATURE HEATER=chamber TARGET={params.S|float}
    TEMPERATURE_WAIT SENSOR="heater_generic chamber" MINIMUM={params.S|float}
  {% else %}
    RESPOND PREFIX="M191" MSG="Missing S parameter"
  {% endif %}

[gcode_macro Clear_thermal_expansion]
gcode:
  _BEACON_REMOVE_NOZZLE_TEMP_OFFSET
  _BEACON_SET_NOZZLE_TEMP_OFFSET RESET=True

  [gcode_macro _TEST_BELTS]
gcode:
  {% if 'x' not in printer.toolhead.homed_axes %}
  {% if 'y' not in printer.toolhead.homed_axes %}
  G28 X Y 
  {% endif %}
  {% endif %}
 
  {% set circles = params.S|default(1)|int %}
  {% set rate = params.F|default(18000)|int %}
  {% for i in range(circles) %}
      G1 X{printer.toolhead.axis_minimum.x + 15} Y{printer.toolhead.axis_minimum.y + 15}  F{rate}
      G1 X{printer.toolhead.axis_maximum.x - 15} Y{printer.toolhead.axis_minimum.y + 15}  F{rate}
      G1 X{printer.toolhead.axis_maximum.x - 15} Y{printer.toolhead.axis_maximum.y - 15} F{rate}
      G1 X{printer.toolhead.axis_minimum.x + 15} Y{printer.toolhead.axis_maximum.y - 15}  F{rate}
      G1 X{printer.toolhead.axis_minimum.x + 15} Y{printer.toolhead.axis_minimum.y + 15}  F{rate}
    {% endfor %}
    G1 X{ printer.toolhead.axis_maximum.x / 2  } Y{printer.toolhead.axis_maximum.y  /2}  F{rate}